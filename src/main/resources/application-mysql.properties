spring.application.name=parking-management

# --- MySQL Datasource ---
spring.datasource.url=jdbc:mysql://localhost:3306/parking_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=appuser
spring.datasource.password=ChangeMe#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Server ---
server.port=8080
server.servlet.context-path=/

# --- Logging (optional) ---
logging.level.com.apc.parking=DEBUG
logging.level.org.springframework.security=INFO
