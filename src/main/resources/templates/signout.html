<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out - SpotFlow Parking</title>
    <link rel="stylesheet" href="/css/custom.css">
    <meta http-equiv="refresh" content="3;url=/">
    <style>
        body.signout-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--primary-color);
            padding: 20px;
        }
        .signout-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
    <script>
        function doLogout(){
            fetch('/logout', { method: 'POST', headers: { 'X-Requested-With':'fetch' }})
              .then(() => { window.location.href = '/login?logout'; })
              .catch(() => { window.location.href = '/login?logout'; });
        }
        document.addEventListener('DOMContentLoaded', doLogout);
    </script>
</head>

<body class="signout-page">
    <div class="signout-card">
        <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Signing you out…</h2>
        <p class="text-muted" style="font-size: 0.95rem; margin-bottom: 24px;">Securing your session. You will be redirected shortly.</p>
        
        <div style="margin: 24px 0;">
            <div class="loading" style="width: 36px; height: 36px; border-width: 3.5px;"></div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 24px; border-top: 1px solid var(--border-color); padding-top: 24px;">
            <a class="btn btn-primary" href="/login" style="font-size: 0.8rem; padding: 8px 16px;">
                <i class="fas fa-sign-in-alt"></i> Go to Login
            </a>
            <a class="btn btn-secondary" href="/" style="font-size: 0.8rem; padding: 8px 16px;">
                <i class="fas fa-home"></i> Home
            </a>
        </div>
    </div>
    <form id="logoutForm" method="post" action="/logout" style="display:none"></form>
</body>

</html>
