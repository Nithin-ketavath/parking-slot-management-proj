<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - SpotFlow Parking</title>
    <link rel="stylesheet" href="/css/custom.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body.error-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--primary-color);
            padding: 20px;
        }
        .error-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            max-width: 550px;
            width: 100%;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .error-icon {
            width: 72px;
            height: 72px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.25rem;
            margin: 0 auto 24px auto;
        }
    </style>
</head>

<body class="error-page">
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Something went wrong</h1>
        <p class="text-muted" style="font-size: 0.95rem; margin-bottom: 24px;">We couldn't process this request, or the requested page could not be found.</p>
        
        <div style="background: var(--light-color); padding: 18px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-size: 0.9rem; text-align: left; margin-bottom: 28px;">
            <div style="margin-bottom: 8px; display: flex; justify-content: space-between;">
                <strong>HTTP Error Status:</strong> 
                <span class="status-badge status-occupied" style="font-size: 0.7rem; padding: 2px 8px;" th:text="${status}">404</span>
            </div>
            <div style="margin-bottom: 8px; display: flex; justify-content: space-between;">
                <strong>Error Reason:</strong> 
                <span style="font-weight: 600; color: var(--primary-color);" th:text="${reason}">Not Found</span>
            </div>
            <div th:if="${message}" style="border-top: 1px solid var(--border-color); margin-top: 12px; padding-top: 12px;">
                <strong>Detail Message:</strong>
                <p style="color: var(--text-secondary); margin-top: 4px; font-family: monospace; word-break: break-all;" th:text="${message}">Detail info</p>
            </div>
        </div>

        <div style="display: flex; gap: 12px; justify-content: center;">
            <a href="/" class="btn btn-primary" style="padding: 10px 24px;">
                <i class="fas fa-home"></i> Go Dashboard
            </a>
            <a href="/profile" class="btn btn-secondary" style="padding: 10px 24px;">
                <i class="fas fa-user-circle"></i> View Profile
            </a>
        </div>
    </div>
</body>

</html>
